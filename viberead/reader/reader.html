<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeRead — Reader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Georgia:ital,wght@0,400;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════════════════════
       VibeRead Reader — Global Variables & Reset
    ═══════════════════════════════════════════════════════════════ */
    :root {
      --bg:           #0d0d11;
      --surface:      #161620;
      --surface2:     #1f1f2e;
      --accent:       #f97316;
      --accent-glow:  rgba(249,115,22,.25);
      --text:         #e8e8f0;
      --text-muted:   #6b6b88;
      --text-dim:     #4a4a60;
      --border:       #252535;
      --radius:       10px;
      --progress:     #f97316;

      /* Reader-specific */
      --word-size:    5rem;
      --word-font:    'Georgia', serif;
      --focal-color:  #f97316;
    }

    /* ── Themes ──────────────────────────────────────────────────── */
    body.theme-dark       { --bg:#0d0d11; --text:#e8e8f0; --surface:#161620; }
    body.theme-midnight   { --bg:#060610; --text:#c0c0e0; --surface:#0e0e1c; }
    body.theme-sepia      { --bg:#1a1510; --text:#ddd0bb; --surface:#231e17; --accent:#d4875a; --focal-color:#d4875a; }
    body.theme-forest     { --bg:#0a1410; --text:#c8dcc8; --surface:#121e16; --accent:#4ade80; --focal-color:#4ade80; }
    body.theme-ocean      { --bg:#06101a; --text:#b0d4f0; --surface:#0e1c2a; --accent:#38bdf8; --focal-color:#38bdf8; }
    body.theme-sunset     { --bg:#1a0a10; --text:#f0c8d8; --surface:#28101c; --accent:#f472b6; --focal-color:#f472b6; }
    body.theme-slate      { --bg:#111218; --text:#d0d4e0; --surface:#191b24; }
    body.theme-warm       { --bg:#1a1208; --text:#ede0cc; --surface:#241a0e; --accent:#fbbf24; --focal-color:#fbbf24; }
    body.theme-paper      { --bg:#f5f0e8; --text:#2c2820; --surface:#ebe6dc; --surface2:#ddd8cc; --border:#ccc8bc; --text-muted:#887868; --text-dim:#aaa898; }
    body.theme-matrix     { --bg:#001200; --text:#00dd00; --surface:#001a00; --accent:#00ff41; --focal-color:#00ff41; }
    body.theme-purple     { --bg:#0e0a18; --text:#d8c8f0; --surface:#160e24; --accent:#a78bfa; --focal-color:#a78bfa; }
    body.theme-ice        { --bg:#060a10; --text:#c8dde8; --surface:#0c1218; --accent:#67e8f9; --focal-color:#67e8f9; }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
      transition: background .3s, color .3s;
    }

    /* ── Reading mode: hide chrome, show only word ─────────────── */
    body.reading #topBar {
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
      position: absolute; top: 0; left: 0; right: 0;
    }
    body.reading #controls {
      transform: translateY(100%);
      opacity: 0;
      pointer-events: none;
      position: absolute; bottom: 0; left: 0; right: 0;
    }
    body.reading #progressBarWrap {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    }
    body.reading #settingsPanel { transform: translateX(100%) !important; }
    body.reading #stage { flex: 1; }
    #topBar, #controls {
      transition: transform .35s cubic-bezier(.4,0,.2,1), opacity .3s;
    }
    /* Session timer badge */
    #sessionTimerStat .val { color: #22c55e; }
    #sessionTimerStat .val.warning { color: #fbbf24; }
    #sessionTimerStat .val.critical { color: #ef4444; animation: pulse-red 1s infinite; }
    @keyframes pulse-red { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── Top Bar ─────────────────────────────────────────────────── */
    #topBar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }
    #docTitle {
      font-size: 12.5px;
      font-weight: 500;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 340px;
    }
    #topBar .spacer { flex: 1; }
    .top-stat {
      display: flex; flex-direction: column; align-items: center;
      padding: 3px 12px;
      border-left: 1px solid var(--border);
      gap: 1px;
    }
    .top-stat .val { font-size: 13px; font-weight: 700; color: var(--text); }
    .top-stat .lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .8px; }
    #wpmDisplay .val { color: var(--accent); }

    /* ── Reader Stage ────────────────────────────────────────────── */
    #stage {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 0 20px;
    }

    /* Focal line (ORP guide) */
    #focalLine {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(680px, 92vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    /* Context lines */
    .ctx-line {
      font-size: calc(var(--word-size) * 0.28);
      color: var(--text-dim);
      font-family: var(--word-font);
      text-align: center;
      min-height: 1.4em;
      transition: opacity .2s;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #ctxAbove { opacity: 0.5; }
    #ctxBelow { opacity: 0.35; }

    /* The RSVP word display */
    #wordBox {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.15em;
      min-height: 1.6em;
      position: relative;
    }
    #wordBox .word-token {
      font-size: var(--word-size);
      font-family: var(--word-font);
      font-weight: 400;
      color: var(--text);
      line-height: 1.1;
      transition: color .05s;
    }
    #wordBox .word-token.focal {
      color: var(--focal-color);
      font-weight: 700;
    }

    /* ORP guide line */
    #orp {
      position: absolute;
      top: -8px;
      bottom: -8px;
      width: 2px;
      background: var(--accent);
      opacity: .25;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 1px;
    }

    /* Flash animation */
    @keyframes flash {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }
    #wordBox.flashing { animation: flash 0.15s ease; }

    /* Pause overlay */
    #pauseOverlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(13,13,17,.7);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s;
      z-index: 5;
    }
    #pauseOverlay.visible { opacity: 1; pointer-events: all; }
    #pauseMsg {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
      display: flex; align-items: center; gap: 12px;
    }
    #pauseMsg .big { font-size: 48px; }

    /* Countdown */
    #countdown {
      font-size: 72px;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 40px var(--accent-glow);
      display: none;
    }

    /* ── Progress Bar ────────────────────────────────────────────── */
    #progressBarWrap {
      flex-shrink: 0;
      height: 4px;
      background: var(--border);
      position: relative;
      overflow: hidden;
    }
    #progressBar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #fb923c);
      transition: width .3s linear;
      box-shadow: 0 0 12px var(--accent-glow);
    }

    /* ── Controls Bar ────────────────────────────────────────────── */
    #controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .ctrl-btn {
      display: flex; align-items: center; justify-content: center;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 14px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background .15s, color .15s, transform .1s, border-color .15s;
      font-family: 'Inter', sans-serif;
      line-height: 1;
      white-space: nowrap;
    }
    .ctrl-btn:hover {
      background: var(--surface);
      color: var(--text);
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .ctrl-btn:active { transform: translateY(0); }
    .ctrl-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      padding: 8px 22px;
      font-weight: 600;
      font-size: 16px;
      box-shadow: 0 4px 14px var(--accent-glow);
    }
    .ctrl-btn.primary:hover {
      background: #ea580c;
      border-color: #ea580c;
      color: #fff;
    }
    .ctrl-sep { width: 1px; height: 28px; background: var(--border); margin: 0 4px; }

    /* WPM control */
    #wpmControl {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
    }
    #wpmControl input[type=range] {
      -webkit-appearance: none;
      width: 90px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
    }
    #wpmControl input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      box-shadow: 0 0 6px var(--accent-glow);
    }
    #wpmControl .lbl { font-size: 10px; color: var(--text-muted); }
    #wpmControl .val { font-size: 12px; font-weight: 700; color: var(--accent); min-width: 36px; }

    /* Words-at-a-time control */
    #watControl {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
    }
    #watControl .lbl { color: var(--text-muted); }
    #watControl .val { color: var(--accent); font-weight: 700; }
    #watControl button {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 14px; padding: 0 3px;
      line-height: 1;
      transition: color .15s;
    }
    #watControl button:hover { color: var(--accent); }

    /* Settings + theme panel */
    #settingsPanel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 320px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 100;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
    }
    #settingsPanel.open { transform: translateX(0); }
    #settingsPanel h2 {
      padding: 18px 20px 14px;
      font-size: 14px; font-weight: 700;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      display: flex; align-items: center; justify-content: space-between;
    }
    #settingsPanel h2 button {
      background: none; border: none; cursor: pointer; color: var(--text-muted); font-size: 18px;
    }
    .settings-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 18px; }
    .setting-group h3 { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }
    .setting-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .setting-row label { font-size: 12.5px; color: var(--text); }
    .setting-row input[type=range] {
      -webkit-appearance: none;
      flex: 1; height: 4px; background: var(--border); border-radius: 2px; outline: none;
    }
    .setting-row input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
    }
    .setting-row select, .setting-row input[type=number] {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 4px 8px; font-size: 12px;
      outline: none;
    }
    .theme-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
    }
    .theme-swatch {
      height: 36px; border-radius: 6px; cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .15s, transform .1s;
      position: relative; overflow: hidden;
      display: flex; align-items: flex-end; padding: 3px;
    }
    .theme-swatch.active { border-color: var(--accent); transform: scale(1.05); }
    .theme-swatch .name { font-size: 8px; font-weight: 600; color: rgba(255,255,255,.8); text-shadow: 0 1px 2px rgba(0,0,0,.8); }

    /* Paste modal */
    #pasteModal {
      position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity .2s;
    }
    #pasteModal.open { opacity: 1; pointer-events: all; }
    .modal-box {
      width: min(600px, 92vw);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 16px;
    }
    .modal-box h2 { font-size: 16px; font-weight: 700; }
    .modal-box textarea {
      width: 100%; height: 200px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); padding: 12px; font-size: 14px; resize: vertical;
      font-family: inherit; outline: none;
    }
    .modal-box textarea::placeholder { color: var(--text-dim); }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; }
    .btn-primary {
      background: var(--accent); color: #fff; border: none; border-radius: 8px;
      padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover { background: #ea580c; }
    .btn-sec {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 16px; font-size: 13px; cursor: pointer;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body class="theme-dark">

<!-- Top Bar -->
<div id="topBar">
  <div id="docTitle">VibeRead</div>
  <div class="spacer"></div>
  <div class="top-stat">
    <span class="val" id="timeLeft">--:--</span>
    <span class="lbl">Time Left</span>
  </div>
  <div class="top-stat" id="wpmDisplay">
    <span class="val" id="topWpm">300</span>
    <span class="lbl">WPM</span>
  </div>
  <div class="top-stat">
    <span class="val" id="wordProgress">0/0</span>
    <span class="lbl">Words</span>
  </div>
  <div class="top-stat" id="sessionTimerStat">
    <span class="val" id="sessionTimer">--:--</span>
    <span class="lbl">Session</span>
  </div>
</div>

<!-- Reader Stage -->
<div id="stage">
  <div id="focalLine">
    <div class="ctx-line" id="ctxAbove"></div>
    <div id="wordBox">
      <div id="orp"></div>
      <span class="word-token focal" id="mainWord">VibeRead</span>
    </div>
    <div class="ctx-line" id="ctxBelow"></div>
  </div>

  <!-- Pause overlay -->
  <div id="pauseOverlay" class="visible">
    <div id="pauseMsg">
      <span class="big">⏸</span>
      <span>Press <kbd style="background:var(--surface2);border:1px solid var(--border);padding:2px 8px;border-radius:4px;">Space</kbd> to start</span>
    </div>
    <div id="countdown"></div>
  </div>
</div>

<!-- Progress Bar -->
<div id="progressBarWrap">
  <div id="progressBar" style="width:0%"></div>
</div>

<!-- Controls -->
<div id="controls">
  <button class="ctrl-btn" id="btnRew10" title="Rewind 10s (J)">⏪ 10s</button>
  <button class="ctrl-btn" id="btnPrev" title="Previous word (←)">◀</button>
  <button class="ctrl-btn primary" id="btnPlay" title="Play/Pause (Space)">▶ Play</button>
  <button class="ctrl-btn" id="btnNext" title="Next word (→)">▶</button>
  <button class="ctrl-btn" id="btnFwd10" title="Forward 10s (L)">10s ⏩</button>
  <div class="ctrl-sep"></div>

  <!-- WPM slider -->
  <div id="wpmControl" title="Speed (↑↓)">
    <span class="lbl">WPM</span>
    <input type="range" id="wpmSlider" min="100" max="1200" step="25" value="300" />
    <span class="val" id="wpmLabel">300</span>
  </div>

  <!-- Words-at-a-time -->
  <div id="watControl" title="Words at a time (1-5)">
    <span class="lbl">W:</span>
    <button id="watDown">−</button>
    <span class="val" id="watVal">1</span>
    <button id="watUp">+</button>
  </div>

  <div class="ctrl-sep"></div>
  <button class="ctrl-btn" id="btnTTS" title="Text-to-speech">🔊</button>
  <button class="ctrl-btn" id="btnFullscreen" title="Fullscreen (F)">⛶</button>
  <button class="ctrl-btn" id="btnSettings" title="Settings (S)">⚙</button>
  <button class="ctrl-btn" id="btnClose" title="Close">✕</button>
</div>

<!-- Settings Panel -->
<div id="settingsPanel">
  <h2>
    Settings
    <button id="closeSettings">✕</button>
  </h2>
  <div class="settings-body">
    <!-- Themes -->
    <div class="setting-group">
      <h3>Color Scheme</h3>
      <div class="theme-grid" id="themeGrid"></div>
    </div>

    <!-- Reading -->
    <div class="setting-group">
      <h3>Reading</h3>
      <div class="setting-row">
        <label>Font Size</label>
        <input type="range" id="fontSizeSlider" min="2" max="9" step="0.5" value="5" />
        <span id="fontSizeVal">5rem</span>
      </div>
      <div class="setting-row">
        <label>Font</label>
        <select id="fontPicker">
          <option value="Georgia, serif">Georgia</option>
          <option value="'Merriweather', serif">Merriweather</option>
          <option value="Arial, sans-serif">Arial</option>
          <option value="'Inter', sans-serif">Inter</option>
          <option value="'Courier New', monospace">Courier</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Show Context</label>
        <select id="ctxMode">
          <option value="both">Above &amp; Below</option>
          <option value="above">Above only</option>
          <option value="below">Below only</option>
          <option value="none">Hidden</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Focal Mark (ORP)</label>
        <select id="orpMode">
          <option value="line">Line</option>
          <option value="none">None</option>
        </select>
      </div>
      <div class="setting-row">
        <label>Max Session (min)</label>
        <select id="maxSessionTime">
          <option value="0">No limit</option>
          <option value="5">5 min</option>
          <option value="10">10 min</option>
          <option value="15">15 min</option>
          <option value="20">20 min</option>
          <option value="25">25 min (Pomodoro)</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">60 min</option>
        </select>
      </div>
    </div>

    <!-- TTS -->
    <div class="setting-group">
      <h3>Text-to-Speech</h3>
      <div class="setting-row">
        <label>Voice</label>
        <select id="ttsVoice"></select>
      </div>
      <div class="setting-row">
        <label>Rate</label>
        <input type="range" id="ttsRate" min="0.5" max="3" step="0.1" value="1" />
        <span id="ttsRateVal">1x</span>
      </div>
    </div>
  </div>
</div>

<!-- Paste Modal -->
<div id="pasteModal">
  <div class="modal-box">
    <h2>📋 Paste Text</h2>
    <textarea id="pasteArea" placeholder="Paste or type your text here…"></textarea>
    <div class="modal-footer">
      <button class="btn-sec" id="cancelPaste">Cancel</button>
      <button class="btn-primary" id="confirmPaste">Start Reading →</button>
    </div>
  </div>
</div>

<script src="reader.js"></script>
</body>
</html>
