<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VibeRead — Statistics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d11; --surface: #161620; --surface2: #1f1f2e;
      --accent: #f97316; --accent-g: rgba(249,115,22,.2);
      --text: #e8e8f0; --muted: #6b6b88; --border: #252535;
      --green: #22c55e; --green-g: rgba(34,197,94,.15);
      --blue: #38bdf8; --blue-g: rgba(56,189,248,.15);
      --purple: #a78bfa; --purple-g: rgba(167,139,250,.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 16px 32px; display: flex; align-items: center; gap: 14px;
    }
    .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), #ea580c); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; color: #fff; font-weight: 700; box-shadow: 0 4px 14px var(--accent-g); }
    .header h1 { font-size: 17px; font-weight: 700; }
    .header h1 span { color: var(--accent); }

    .container { max-width: 800px; margin: 0 auto; padding: 32px 24px; display: flex; flex-direction: column; gap: 24px; }

    /* Stats grid */
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px 20px; display: flex; flex-direction: column; gap: 4px;
      position: relative; overflow: hidden;
    }
    .stat-card::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.02) 0%, transparent 60%);
      pointer-events: none;
    }
    .stat-card .icon { font-size: 28px; margin-bottom: 8px; }
    .stat-card .val {
      font-size: 32px; font-weight: 700; line-height: 1;
      background: linear-gradient(135deg, var(--card-color, var(--accent)), white);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .stat-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .stat-card .bar { width: 40px; height: 3px; border-radius: 2px; background: var(--card-color, var(--accent)); margin-top: 10px; opacity: .5; }

    .stat-card.accent  { --card-color: #f97316; border-color: rgba(249,115,22,.2); }
    .stat-card.green   { --card-color: #22c55e; border-color: rgba(34,197,94,.2); }
    .stat-card.blue    { --card-color: #38bdf8; border-color: rgba(56,189,248,.2); }
    .stat-card.purple  { --card-color: #a78bfa; border-color: rgba(167,139,250,.2); }
    .stat-card.yellow  { --card-color: #fbbf24; border-color: rgba(251,191,36,.2); }
    .stat-card.pink    { --card-color: #f472b6; border-color: rgba(244,114,182,.2); }

    /* Section header */
    .section-h { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); }

    /* PDF list */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); }
    .card-header h2 { font-size: 13px; font-weight: 600; }
    .pdf-row {
      display: flex; align-items: center; gap: 14px;
      padding: 13px 20px; border-bottom: 1px solid var(--border);
      transition: background .1s;
    }
    .pdf-row:last-child { border-bottom: none; }
    .pdf-row:hover { background: var(--surface2); }
    .pdf-icon { font-size: 22px; flex-shrink: 0; }
    .pdf-info { flex: 1; overflow: hidden; }
    .pdf-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pdf-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .pdf-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .pdf-pct { font-size: 13px; font-weight: 700; color: var(--accent); }
    .prog { width: 80px; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .prog-bar { height: 100%; background: linear-gradient(90deg, var(--accent), #fb923c); border-radius: 3px; }

    /* Empty state */
    .empty { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }
    .empty .big { font-size: 40px; margin-bottom: 10px; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">V</div>
  <h1>Vibe<span>Read</span> Statistics</h1>
</div>

<div class="container">

  <!-- Main stat cards -->
  <div class="stats-grid">
    <div class="stat-card accent">
      <div class="icon">📖</div>
      <div class="val" id="totalWords">0</div>
      <div class="lbl">Total Words Read</div>
      <div class="bar"></div>
    </div>
    <div class="stat-card green">
      <div class="icon">🔥</div>
      <div class="val" id="streak">0</div>
      <div class="lbl">Day Streak</div>
      <div class="bar"></div>
    </div>
    <div class="stat-card blue">
      <div class="icon">📅</div>
      <div class="val" id="sessions">0</div>
      <div class="lbl">Reading Sessions</div>
      <div class="bar"></div>
    </div>
    <div class="stat-card purple">
      <div class="icon">⏱</div>
      <div class="val" id="hoursRead">0h</div>
      <div class="lbl">Est. Hours Saved</div>
      <div class="bar"></div>
    </div>
    <div class="stat-card yellow">
      <div class="icon">📄</div>
      <div class="val" id="pdfCount">0</div>
      <div class="lbl">PDFs Started</div>
      <div class="bar"></div>
    </div>
    <div class="stat-card pink">
      <div class="icon">⚡</div>
      <div class="val" id="avgWpm">—</div>
      <div class="lbl">Avg WPM Setting</div>
      <div class="bar"></div>
    </div>
  </div>

  <!-- PDF Progress -->
  <span class="section-h">PDF Reading Progress</span>
  <div class="card">
    <div class="card-header"><h2>📄 Saved PDFs</h2></div>
    <div id="pdfList">
      <div class="empty"><div class="big">📄</div>No PDFs opened yet.<br/>Open a PDF in the PDF reader to track progress.</div>
    </div>
  </div>

</div>

<script src="stats.js"></script>
</body>
</html>
